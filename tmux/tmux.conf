##### 0) Reset any old overrides #############################################
source-file ~/.config/tmux/tmux.reset.conf


##### 1) Terminal / capabilities #############################################
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'


##### 2) Core QoL / behavior #################################################
# Clear style overrides that can leak from previous reloads.
set -gu window-style
set -gu window-active-style

set -g prefix ^A
set -g base-index 1
set -g detach-on-destroy off
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi

# Pane borders
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'


##### 3) Tooling options (fzf-url etc.) ######################################
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'


##### 4) Plugins (TPM last) ##################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'omerxx/tmux-sessionx'


##### 5) Plugin-specific preferences #########################################
# tmux-sessionx
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

# Resurrect / Continuum
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'


##### 6) Catppuccin theme options ###########################################
# Clear theme vars so switching flavor (latte/macchiato) works on reload.
set -gu @thm_bg
set -gu @thm_fg
set -gu @thm_rosewater
set -gu @thm_flamingo
set -gu @thm_pink
set -gu @thm_mauve
set -gu @thm_red
set -gu @thm_maroon
set -gu @thm_peach
set -gu @thm_yellow
set -gu @thm_green
set -gu @thm_teal
set -gu @thm_sky
set -gu @thm_sapphire
set -gu @thm_blue
set -gu @thm_lavender
set -gu @thm_subtext_1
set -gu @thm_subtext_0
set -gu @thm_overlay_2
set -gu @thm_overlay_1
set -gu @thm_overlay_0
set -gu @thm_surface_2
set -gu @thm_surface_1
set -gu @thm_surface_0
set -gu @thm_mantle
set -gu @thm_crust

# Catppuccin status module colors are set with "set -o" in the plugin, so
# clear cached values to avoid light/dark leftovers after reload.
set -gu @catppuccin_status_module_text_bg
set -gu @catppuccin_status_application_icon_bg
set -gu @catppuccin_status_application_icon_fg
set -gu @catppuccin_status_application_text_fg
set -gu @catppuccin_status_battery_icon_bg
set -gu @catppuccin_status_battery_icon_fg
set -gu @catppuccin_status_battery_text_fg
set -gu @catppuccin_status_clima_icon_bg
set -gu @catppuccin_status_clima_icon_fg
set -gu @catppuccin_status_clima_text_fg
set -gu @catppuccin_status_cpu_icon_bg
set -gu @catppuccin_status_cpu_icon_fg
set -gu @catppuccin_status_cpu_text_bg
set -gu @catppuccin_status_cpu_text_fg
set -gu @catppuccin_status_date_time_icon_bg
set -gu @catppuccin_status_date_time_icon_fg
set -gu @catppuccin_status_date_time_text_fg
set -gu @catppuccin_status_directory_icon_bg
set -gu @catppuccin_status_directory_icon_fg
set -gu @catppuccin_status_directory_text_fg
set -gu @catppuccin_status_gitmux_icon_bg
set -gu @catppuccin_status_gitmux_icon_fg
set -gu @catppuccin_status_gitmux_text_fg
set -gu @catppuccin_status_host_icon_bg
set -gu @catppuccin_status_host_icon_fg
set -gu @catppuccin_status_host_text_fg
set -gu @catppuccin_status_kube_icon_bg
set -gu @catppuccin_status_kube_icon_fg
set -gu @catppuccin_status_kube_text_fg
set -gu @catppuccin_status_load_icon_bg
set -gu @catppuccin_status_load_icon_fg
set -gu @catppuccin_status_load_text_fg
set -gu @catppuccin_status_pomodoro_plus_icon_bg
set -gu @catppuccin_status_pomodoro_plus_icon_fg
set -gu @catppuccin_status_pomodoro_plus_text_fg
set -gu @catppuccin_status_session_icon_bg
set -gu @catppuccin_status_session_icon_fg
set -gu @catppuccin_status_session_text_fg
set -gu @catppuccin_status_uptime_icon_bg
set -gu @catppuccin_status_uptime_icon_fg
set -gu @catppuccin_status_uptime_text_fg
set -gu @catppuccin_status_user_icon_bg
set -gu @catppuccin_status_user_icon_fg
set -gu @catppuccin_status_user_text_fg
set -gu @catppuccin_status_weather_icon_bg
set -gu @catppuccin_status_weather_icon_fg
set -gu @catppuccin_status_weather_text_fg

# Flavor from ~/.config/tmux/catppuccin-flavor.conf (written by .zshrc from theme-mode or system)
source-file -q ~/.config/tmux/catppuccin-flavor.conf
# On macOS, prefer current system appearance on each reload.
if-shell '[ "$(uname -s)" = "Darwin" ]' \
  'if-shell "defaults read -g AppleInterfaceStyle >/dev/null 2>&1" "set -g @catppuccin_flavor macchiato" "set -g @catppuccin_flavor latte"' \
  ''
# Flavor & window "pills"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_fill "number"            # (kept as-is)
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_current_number_color "#{@thm_blue}" # (kept as-is)
set -g @catppuccin_window_flags "icon"

# Status composition (left / right) + lengths
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-left-length 40

set -g status-right "#{E:@catppuccin_status_directory} #{E:@catppuccin_status_date_time}"
set -agF status-right " #{E:@catppuccin_status_battery}"
set -g status-right-length 100

# Separators & status bar style
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

# Module texts
set -g @catppuccin_directory_text " #{b:pane_current_path}"
set -g @catppuccin_date_time_text " %a %d %b %I:%M%p"

# Force re-apply Catppuccin on config reload so flavor changes take effect
# even when the tmux server stays alive.
if-shell '[ -f ~/.config/tmux/plugins/tmux/catppuccin_options_tmux.conf ]' \
  'source-file ~/.config/tmux/plugins/tmux/catppuccin_options_tmux.conf'
if-shell '[ -f ~/.config/tmux/plugins/tmux/catppuccin_tmux.conf ]' \
  'source-file ~/.config/tmux/plugins/tmux/catppuccin_tmux.conf'


##### 7) TPM bootstrap (keep last) ###########################################
run '~/.config/tmux/plugins/tpm/tpm'
