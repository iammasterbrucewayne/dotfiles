gui:
  nerdFontsVersion: "3"

os:
  readFromClipboardCmd: "pbpaste"

customCommands:
  - key: "X"
    command: "MSG=$(cat .git/COMMIT_EDITMSG); MSG=$(gum input --prompt \"Commit\ message: \" --value \"$MSG\"); git commit -m \"$MSG\""
    context: "files"
    description: "Commit with stored message (editable)"
    loadingText: "Committing..."

  - key: "C"
    command: |
      #!/bin/bash
      commit_msg=$(cat << EOF
      {{ .Form.Type }}{{if .Form.Scope}}({{ .Form.Scope }}){{end}}: {{ .Form.Subject }}
      {{if .Form.Body}}

      {{ .Form.Body }}
      {{end}}
      {{if .Form.Breaking}}

      BREAKING CHANGE: {{ .Form.Breaking }}
      {{end}}
      {{if .Form.Issues}}

      {{ .Form.Issues }}
      {{end}}
      EOF
      )
      git commit -m "$commit_msg"
    description: "Commit with commitizen"
    context: "files"
    loadingText: "Creating commit..."
    prompts:
      - type: "menu"
        title: "Select the type of change you're committing"
        key: "Type"
        options:
          - name: "✨ feat"
            description: "A new feature"
            value: "feat"
          - name: "🐛 fix"
            description: "A bug fix"
            value: "fix"
          - name: "📚 docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "💎 style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
          - name: "📦 refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "🚀 perf"
            description: "A code change that improves performance"
            value: "perf"
          - name: "🚨 test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
          - name: "🛠 build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
          - name: "⚙️ ci"
            description: "Changes to our CI configuration files and scripts"
            value: "ci"
          - name: "♻️ chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "🗑 revert"
            description: "Reverts a previous commit"
            value: "revert"
      - type: "input"
        title: "What is the scope of this change (e.g. component or file name)"
        key: "Scope"
      - type: "input"
        title: "Write a short, imperative tense description of the change"
        key: "Subject"
      - type: "input"
        title: "Provide a longer description of the change (optional)"
        key: "Body"
      - type: "input"
        title: "Describe any breaking changes (leave empty if none)"
        key: "Breaking"
      - type: "input"
        title: "List any issue references (e.g. 'fix #123', 're #123', leave empty if none)"
        key: "Issues"
      - type: "confirm"
        title: "Is the commit message correct?"
        body: |
          {{ .Form.Type }}{{if .Form.Scope}}({{ .Form.Scope }}){{end}}: {{ .Form.Subject }}
          {{if .Form.Body}}

          {{ .Form.Body }}
          {{end}}
          {{if .Form.Breaking}}

          BREAKING CHANGE: {{ .Form.Breaking }}
          {{end}}
          {{if .Form.Issues}}

          {{ .Form.Issues }}
          {{end}}

  - key: "A"
    description: "Generate AI commit draft"
    context: "files"
    loadingText: "Generating AI draft..."
    output: "popup"
    outputTitle: "AI Commit Draft"
    command: '"$HOME/.config/lazygit/scripts/lazygit-ai-commit-draft" prewarm'

  - key: "E"
    description: "Edit AI draft and commit"
    context: "files"
    loadingText: "Creating commit..."
    prompts:
      - type: "input"
        title: "Commit summary"
        key: "Summary"
        initialValue: '{{ runCommand "bash -lc \"$HOME/.config/lazygit/scripts/lazygit-ai-commit-draft cached_subject\"" }}'
      - type: "input"
        title: "Commit description (optional)"
        key: "Description"
        initialValue: '{{ runCommand "bash -lc \"$HOME/.config/lazygit/scripts/lazygit-ai-commit-draft cached_body\"" }}'
    command: |
      #!/bin/bash
      set -euo pipefail

      if git diff --cached --quiet; then
        echo "No staged changes. Stage files first."
        exit 1
      fi

      summary={{ .Form.Summary | quote }}
      description={{ .Form.Description | quote }}

      if [ -z "$(printf "%s" "$summary" | tr -d '[:space:]')" ]; then
        echo "Commit summary cannot be empty"
        exit 1
      fi

      if [ -n "$(printf "%s" "$description" | tr -d '[:space:]')" ]; then
        printf "%s\n\n%s\n" "$summary" "$description" > .git/COMMIT_EDITMSG
      else
        printf "%s\n" "$summary" > .git/COMMIT_EDITMSG
      fi

      git commit -F .git/COMMIT_EDITMSG

  - key: "U"
    description: "Undo last commit and keep changes staged"
    command: |
      #!/bin/bash
      # Get the last commit message
      last_commit_msg=$(git log -1 --pretty=%B)
      # Undo the last commit, keep changes staged
      git reset --soft HEAD^
      # Set environment variables for the next commit
      printf "%s" "$last_commit_msg" > .git/COMMIT_EDITMSG
    context: "files"
    loadingText: "Undoing last commit..."
